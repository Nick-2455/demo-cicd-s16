name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: INTEGRACIÓN CONTINUA ──────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test
        env:
          NODE_ENV: test

  # ── JOB 2: ENTREGA CONTINUA ───────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Instalar dependencias (producción)
        run: npm ci --omit=dev

      - name: Build artefacto
        run: |
          mkdir -p dist
          cp -r src dist/
          cp package.json dist/
          echo "Build completado: $(date)" > dist/build-info.txt
          echo "Commit: ${{ github.sha }}" >> dist/build-info.txt
          cat dist/build-info.txt

      - name: Simular deploy
        run: |
          echo "Desplegando versión ${{ github.sha }} a producción..."
          echo "Deploy exitoso"
