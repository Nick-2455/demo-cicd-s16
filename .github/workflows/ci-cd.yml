name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: INTEGRACIÓN CONTINUA ──────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    container:
      image: node:${{ matrix.node-version }}-alpine

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test
        env:
          NODE_ENV: test

  # ── JOB 2: DESPLIEGUE CONTINUO ───────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    container:
      image: node:20-alpine

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar dependencias (producción)
        run: npm ci --omit=dev


      - name: Build artefacto
        run: |
          mkdir -p dist
          cp -r src dist/
          cp package.json dist/
          echo "Build completado: $(date)" > dist/build-info.txt
          echo "Commit: ${{ github.sha }}" >> dist/build-info.txt
          cat dist/build-info.txt

      - name: Simular deploy
        run: |
          echo "Desplegando versión ${{ github.sha }} a producción..."
          echo "Deploy exitoso"
